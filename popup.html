<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>URL Guardian</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #161a22;
      --border: #1e2530;
      --green: #00ff88;
      --red: #ff3a3a;
      --yellow: #ffb800;
      --muted: #4a5568;
      --text: #c9d1d9;
      --text-dim: #6e7f96;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      width: 400px;
      min-height: 520px;
      overflow-x: hidden;
    }

    header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: var(--green);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--green);
    }

    .logo-sub {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
    }

    .stats-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      flex: 1;
      padding: 12px 16px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .stat:last-child { border-right: none; }

    .stat-val {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-val.safe { color: var(--green); }
    .stat-val.malicious { color: var(--red); }
    .stat-val.pending { color: var(--yellow); }

    .stat-label {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .url-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .url-list::-webkit-scrollbar { width: 4px; }
    .url-list::-webkit-scrollbar-track { background: var(--bg); }
    .url-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .url-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .url-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .url-dot.safe { background: var(--green); }
    .url-dot.malicious { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .url-dot.pending { background: var(--yellow); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .url-text {
      font-size: 11px;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .url-meta {
      font-size: 9px;
      color: var(--text-dim);
    }

    .url-meta.bad { color: var(--red); }

    .remove-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .remove-btn:hover { border-color: var(--red); color: var(--red); }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.8;
    }

    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.08em;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--muted); color: var(--text); }

    .cache-info {
      font-size: 9px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <div>
      <div class="logo-text">URL GUARDIAN</div>
      <div class="logo-sub">THREAT DETECTION ACTIVE</div>
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-val safe" id="count-safe">0</div>
    <div class="stat-label">SAFE</div>
  </div>
  <div class="stat">
    <div class="stat-val malicious" id="count-malicious">0</div>
    <div class="stat-label">BLOCKED</div>
  </div>
  <div class="stat">
    <div class="stat-val pending" id="count-pending">0</div>
    <div class="stat-label">SCANNING</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="all">ALL</button>
  <button class="tab" data-tab="malicious">BLOCKED</button>
  <button class="tab" data-tab="safe">SAFE</button>
</div>

<div id="tab-all" class="tab-content active">
  <div class="url-list" id="list-all"></div>
</div>
<div id="tab-malicious" class="tab-content">
  <div class="url-list" id="list-malicious"></div>
</div>
<div id="tab-safe" class="tab-content">
  <div class="url-list" id="list-safe"></div>
</div>

<footer>
  <button class="clear-btn" id="clear-btn">CLEAR CACHE</button>
  <span class="cache-info" id="cache-info">0 entries cached</span>
</footer>

<script src="popup.js"></script>
</body>
</html>
